<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <title>Contact</title>
    <link rel="stylesheet" href="layout.css" />
    <link rel="stylesheet" href="styles.css" />
    <script>
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    </script>
    <script src="script.js" defer></script>
</head>
<body>

  <header>
    <span class="site-title">Portfolio</span>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="showcase.html">Showcase</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
  </header>

<main>
    <h1 class="section-heading">Contact</h1>
    <p class="section-subheading">Get in touch, let's build something great!</p>
 
    <div class="contact-layout">

      <div class="contact-info">
        <h3>My Information</h3>
        <p class="mt-2">
          Email: <a href="mailto:fukleja.stu.clcillinois.edu">fukleja.stu.clcillinois.edu</a>
        </p>
		<p>GitHub: <a href="https://github.com/F-Ukleja">F-Ukleja</a></p>
        <p>Location: Fox Lake, Illinois</p>
      </div>

      <div>
        <p class="section-subheading">Contact Me Here:</p>
        <form class="contact-form" action="#" method="post">
          <div>
            <label class="form-label" for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />
          </div>
          <div>
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
          <div>
            <label class="form-label" for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your message here…" required></textarea>
          </div>
          <div class="submit-row">
            <button type="submit">Submit</button>
          </div>
        </form>
      </div>
 
    </div>
  </main>
 
  <footer>
    <p>&copy; 2026. All Rights Reserved.</p>
  </footer>
 
</body>
</html>
